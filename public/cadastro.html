<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - Block Films</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">Block Films</a>
        <div class="user-actions" id="user-actions"></div>
      </div>
    </header>

    <main class="container">
      <section class="auth-panel">
        <form class="auth-form" id="registerForm">
          <h2>Criar conta</h2>
          <p class="form-message info">
            Campos alinhados ao banco <strong>sistema_filmes</strong> (usuarios).
          </p>
          <div class="input-group">
            <label for="nomeCompleto">Nome completo</label>
            <input id="nomeCompleto" name="nomeCompleto" type="text" required />
          </div>
          <div class="input-group">
            <label for="nomeUsuario">Nome de usuário</label>
            <input id="nomeUsuario" name="nomeUsuario" type="text" required />
          </div>
          <div class="input-group">
            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" required />
          </div>
          <div class="input-group">
            <label for="cpf">CPF</label>
            <input id="cpf" name="cpf" type="text" maxlength="11" placeholder="Somente números" required />
          </div>
          <div class="input-group">
            <label for="senha">Senha</label>
            <input id="senha" name="senha" type="password" required />
          </div>
          <button type="submit" class="btn-primary">Cadastrar</button>
          <p class="form-message info">
            Já tem conta? <a href="login.html">Faça login</a>.
          </p>
          <p id="message" class="form-message"></p>
        </form>
      </section>
    </main>

    <script src="js/main.js" defer></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        await loadHeader();
        await redirectIfAuthenticated();
        const form = document.getElementById("registerForm");
        const message = document.getElementById("message");

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          message.textContent = "";

          const data = {
            nomeCompleto: form.nomeCompleto.value.trim(),
            nomeUsuario: form.nomeUsuario.value.trim(),
            email: form.email.value.trim(),
            cpf: form.cpf.value.trim(),
            senha: form.senha.value,
          };

          try {
            await apiRequest("/api/registrar", { method: "POST", body: data });
            showMessage(message, "Conta criada! Redirecionando...", "success");
            setTimeout(() => (window.location.href = "login.html"), 1000);
          } catch (error) {
            showMessage(message, error.message, "error");
          }
        });
      });
    </script>
  </body>
</html>
