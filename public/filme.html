<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filme - Block Films</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">Block Films</a>
        <nav class="nav-links">
          <a href="index.html">Catálogo</a>
          <a href="avaliacao.html">Avaliar</a>
          <a href="perfil.html">Meu Perfil</a>
        </nav>
        <div class="user-actions" id="user-actions"></div>
      </div>
    </header>

    <main class="container">
      <div id="loading" class="empty-state">Carregando filme...</div>
      <div id="movieDetail" style="display:none"></div>
      <div id="notFound" class="empty-state" style="display:none">
        Filme não encontrado. <a href="index.html">Voltar ao catálogo</a>
      </div>
    </main>

    <footer class="footer">
      <div class="container">Block Films</div>
    </footer>

    <script src="js/main.js" defer></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        await loadHeader();
        const nome = getQueryParam("nome") || getQueryParam("titulo");
        if (!nome) {
          document.getElementById("loading").style.display = "none";
          document.getElementById("notFound").style.display = "block";
          return;
        }

        try {
          const data = await apiRequest(`/api/filme/${encodeURIComponent(nome)}`);
            const { filme, avaliacoes } = data;
            document.title = `${filme.nome} - Block Films`;
          document.getElementById("loading").style.display = "none";

            const currentUser = await getCurrentUser();

          const pctPositive = avaliacoes.length
            ? Math.round(
                (avaliacoes.filter((a) => Number(a.nota) >= 7).length / avaliacoes.length) * 100,
              )
            : 0;

          document.getElementById("movieDetail").innerHTML = `
            <section class="movie-hero">
                  <div class="movie-hero-poster">
                    <img id="movie-poster-img" src="${escapeHtml(filme.imagem)}" alt="${escapeHtml(filme.nome)}"
                      onerror="this.src='${PLACEHOLDER_POSTER}'" />
                  </div>
              <div class="movie-hero-info">
                <h1>${escapeHtml(filme.nome)}</h1>
                <p class="movie-meta">
                  ${filme.categoria ? `<span>${escapeHtml(filme.categoria)}</span>` : ""}
                  ${filme.idade ? `<span>Class. ${escapeHtml(filme.idade)}+</span>` : ""}
                </p>
                <div class="movie-scores">
                  <div class="score-box ${ratingColor(filme.media)}">
                    <span class="score-big">${filme.media.toFixed(1)}</span>
                    <span class="score-label">Nota média</span>
                    <span class="review-stars">${renderStars(filme.media)}</span>
                  </div>
                  <div class="score-box score-tomato">
                    <span class="score-big">${pctPositive}%</span>
                    <span class="score-label">Críticas positivas</span>
                    <span class="score-sublabel">notas ≥ 7</span>
                  </div>
                  <div class="score-box score-count">
                    <span class="score-big">${filme.total_avaliacoes}</span>
                    <span class="score-label">Avaliações</span>
                    <span class="score-sublabel">${filme.nota_minima} – ${filme.nota_maxima}</span>
                  </div>
                </div>
                <p class="movie-synopsis">${escapeHtml(filme.sinopse)}</p>
                <a href="avaliacao.html?nome=${encodeURIComponent(filme.nome)}" class="btn-primary">Avaliar este filme</a>
                <div id="change-cover-area" style="margin-top:12px"></div>
              </div>
            </section>

            <section class="movie-breakdown">
              <h2 class="section-title">Distribuição de notas</h2>
              <div class="score-bars">${renderScoreBars(filme.distribuicao, filme.total_avaliacoes)}</div>
            </section>

            <section class="section-spaced">
              <h2 class="section-title">Críticas da comunidade (${avaliacoes.length})</h2>
              <div id="reviewsList" class="reviews-list"></div>
            </section>
          `;
          document.getElementById("movieDetail").style.display = "block";
          renderReviewList(avaliacoes, "reviewsList", currentUser?.id_usuario || null);

          // Mostrar formulário de alteração de capa para usuários autenticados
          try {
            const current = await getCurrentUser();
            if (current) {
              const changeArea = document.getElementById("change-cover-area");
              changeArea.innerHTML = `
                <form id="changeCoverForm" class="small-form" enctype="multipart/form-data">
                  <label>Alterar capa:</label>
                  <input type="file" name="imagem" accept="image/*" />
                  <input type="hidden" name="nome" value="${escapeHtml(filme.nome)}" />
                  <button class="btn-secondary" type="submit">Enviar nova capa</button>
                  <span id="changeCoverMsg" class="form-message"></span>
                </form>
              `;

              document.getElementById("changeCoverForm").addEventListener("submit", async (ev) => {
                ev.preventDefault();
                const msg = document.getElementById("changeCoverMsg");
                msg.textContent = "Enviando...";
                const form = ev.currentTarget;
                const fd = new FormData(form);
                try {
                  const res = await fetch(`${API_BASE_URL}/api/filme/imagem`, {
                    method: "POST",
                    credentials: "include",
                    body: fd,
                  });
                  const data = await res.json().catch(() => null);
                  if (!res.ok) throw new Error(data?.error || "Falha ao atualizar capa.");
                  document.getElementById("movie-poster-img").src = data.imagem || '${PLACEHOLDER_POSTER}';
                  msg.textContent = "Capa atualizada com sucesso.";
                } catch (err) {
                  console.error(err);
                  msg.textContent = err.message || "Erro ao atualizar capa.";
                }
              });
            }
          } catch (e) {
            // sem ação quando não autenticado
          }
        } catch {
          document.getElementById("loading").style.display = "none";
          document.getElementById("notFound").style.display = "block";
        }
      });
    </script>
  </body>
</html>
