<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Block Films</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">Block Films</a>
        <div class="user-actions" id="user-actions"></div>
      </div>
    </header>

    <main class="container">
      <section class="auth-panel">
        <form class="auth-form" id="loginForm">
          <h2>Entrar</h2>
          <div class="input-group">
            <label for="login">Usuário ou e-mail</label>
            <input
              id="login"
              type="text"
              name="login"
              placeholder="admin ou admin@email.com"
              required
            />
          </div>
          <div class="input-group">
            <label for="senha">Senha</label>
            <input
              id="senha"
              type="password"
              name="senha"
              placeholder="Sua senha"
              required
            />
          </div>
          <button type="submit" class="btn-primary">Entrar</button>
          <p class="form-message info">
            Ainda não tem conta? <a href="cadastro.html">Cadastre-se agora</a>.
          </p>
          <p id="message" class="form-message"></p>
        </form>
      </section>
    </main>

    <script src="js/main.js" defer></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        await loadHeader();
        const user = await redirectIfAuthenticated();
        if (user) return;

        const form = document.getElementById("loginForm");
        const message = document.getElementById("message");
        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          message.textContent = "";

          const data = {
            login: form.login.value.trim(),
            senha: form.senha.value,
          };

          try {
            await apiRequest("/api/login", { method: "POST", body: data });
            const params = new URLSearchParams(window.location.search);
            const returnTo = params.get("return");
            const safe =
              returnTo && returnTo.startsWith("/") && !returnTo.startsWith("//")
                ? returnTo
                : "index.html";
            window.location.href = safe;
          } catch (error) {
            showMessage(message, error.message, "error");
          }
        });
      });
    </script>
  </body>
</html>
